        }

            animation: spin 1s linear infinite;
        }

<div class="relative">
<svg class="animate-spin-custom h-12 w-12 text-secondary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
<div class="absolute inset-0 blur-md bg-secondary/20 rounded-full animate-pulse"></div>
</div>
<div class="space-y-1">

</div>
</div>

</div>

<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block px-1">CORREO ELECTRÓNICO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-highest border-white/5 rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="nombre@empresa.ai" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block px-1">CONTRASEÑA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-highest border-white/5 rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
