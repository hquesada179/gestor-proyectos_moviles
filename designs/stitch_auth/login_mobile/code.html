<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col selection:bg-secondary-container selection:text-white">
<!-- TopAppBar Segment (Using JSON Identity) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 bg-[#051424]/80 backdrop-blur-2xl border-b border-white/10 shadow-[0_4px_20px_rgba(167,75,254,0.15)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-indigo-500" data-icon="arrow_back">arrow_back</span>
<span class="text-xl font-black tracking-tighter text-white bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 font-inter">Efficiency AI</span>
</div>
<button class="text-slate-400 font-inter tracking-tight hover:bg-white/5 transition-all duration-300 px-4 py-2 rounded-lg active:scale-95">Support</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center pt-20 pb-40 px-gutter bg-mesh relative overflow-hidden">
<!-- Abstract Decorative Nodes (Productivity suggestion) -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-32 h-32 border border-indigo-500/30 rounded-full blur-xl"></div>
<div class="absolute bottom-1/4 right-1/4 w-48 h-48 border border-purple-500/20 rounded-full blur-2xl"></div>
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<line stroke="rgba(167, 75, 254, 0.1)" stroke-width="1" x1="10%" x2="30%" y1="20%" y2="40%"></line>
<line stroke="rgba(167, 75, 254, 0.1)" stroke-width="1" x1="30%" x2="25%" y1="40%" y2="70%"></line>
<circle cx="30%" cy="40%" fill="rgba(167, 75, 254, 0.2)" r="3"></circle>
<circle cx="10%" cy="20%" fill="rgba(167, 75, 254, 0.1)" r="2"></circle>
</svg>
</div>
<!-- Login Container -->
<div class="w-full max-w-md z-10">
<div class="glass-panel ai-glow p-margin rounded-xl flex flex-col gap-stack-gap">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-4">
<div class="w-16 h-16 bg-gradient-to-br from-secondary-container to-on-tertiary-container rounded-xl flex items-center justify-center mb-stack-gap shadow-lg">
<span class="material-symbols-outlined text-white text-4xl" data-icon="account_tree" style="font-variation-settings: 'FILL' 1;">account_tree</span>
</div>
<h1 class="font-headline-md text-headline-md text-white">Gestor de Proyectos</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Inicia sesión para continuar</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-gutter" onsubmit="return false;">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">CORREO ELECTRÓNICO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary-container/50 focus:border-secondary transition-all" placeholder="ejemplo@eficiencia.ai" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant">CONTRASEÑA</label>
<a class="font-micro-tag text-micro-tag text-secondary hover:text-white transition-colors" href="#">¿OLVIDASTE TU CONTRASEÑA?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary-container/50 focus:border-secondary transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-on-surface transition-colors" data-icon="visibility">visibility</span>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container text-secondary-container focus:ring-secondary-container" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Recordar sesión</label>
</div>
<button class="w-full py-4 bg-gradient-to-r from-secondary-container to-on-tertiary-container text-white font-headline-md text-body-base rounded-lg shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                        Iniciar sesión
                        <span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-4 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        ¿No tienes cuenta? 
                        <a class="text-secondary font-semibold hover:underline decoration-secondary/30 underline-offset-4 transition-all" href="#">Regístrate</a>
</p>
</div>
</div>
<!-- Secondary Actions -->
<div class="mt-8 flex justify-center gap-stack-gap">
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant hover:bg-white/5 transition-colors font-body-sm text-on-surface-variant">
<img alt="" class="w-4 h-4 opacity-70" data-alt="Google colorful letter G logo minimalist isolated on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzR-3S_QJfqICmK0Yd7L21Cz9HvIin6f0Wc_3QZTmDutIdAdTKFbQHlIHZGWhHU_bwEimwqOqWDxpDYubu6jY4_qrRw0QBhsZLyd71eImimG8XzubIJrupxhsxf5mowr29DZXmfDRl0cEsZJ9JPYvRIT7gjVwrgKQ_OKM_DRsjtDsiG6SRTNBuL3Vkd4oZ4CyryNP1Bo7cqA6k511Gfr4bfDKqwzYOs5A7jv3f6rutHZNV6zZ36aJGXwkxYZTodeSd8K6vz-ClBg6N"/>
                    Continuar con Google
                </button>
</div>
</div>
</main>
<!-- Footer Segment (Using JSON Identity) -->
<footer class="w-full max-w-7xl mx-auto px-8 py-12 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-white/5 bg-transparent">
<p class="text-xs font-inter text-slate-500">© 2024 Efficiency AI. High-velocity data processing.</p>
<div class="flex gap-stack-gap">
<a class="text-xs font-inter text-slate-500 hover:text-indigo-300 transition-colors cursor-pointer" href="#">Privacy Policy</a>
<a class="text-xs font-inter text-slate-500 hover:text-indigo-300 transition-colors cursor-pointer" href="#">Terms of Service</a>
<a class="text-xs font-inter text-slate-500 hover:text-indigo-300 transition-colors cursor-pointer" href="#">Security</a>
</div>
</footer>
</body></html>
